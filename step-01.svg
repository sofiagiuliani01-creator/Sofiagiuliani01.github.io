<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Valutazione iniziale personalizzata">
  <defs>
    <linearGradient id="aqua01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7df4e5"/>
      <stop offset="1" stop-color="#42d7ca"/>
    </linearGradient>
    <style>
      .ln{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#eaf8ff;stroke-width:16}
      .a{stroke:url(#aqua01);stroke-width:16}
      .p{animation:float 4s ease-in-out infinite}
      .s{animation:pulse 2s ease-in-out infinite}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(.94)}50%{opacity:1;transform:scale(1.06)}}
    </style>
  </defs>

  <g class="p" transform-origin="360 250">
    <circle cx="270" cy="245" r="78" class="ln w"/>
    <path d="M324 300l52 52" class="ln a"/>
  </g>

  <g transform-origin="500 260" class="p" style="animation-delay:.2s">
    <rect x="418" y="172" width="172" height="176" rx="26" class="ln w"/>
    <path d="M450 220h108M450 262h78M450 300h96" class="ln a"/>
  </g>

  <g class="s" transform-origin="154 144">
    <circle cx="154" cy="144" r="11" fill="#7df4e5"/>
  </g>
  <g class="s" transform-origin="612 112" style="animation-delay:.5s">
    <path d="M612 92l8 16 16 8-16 8-8 16-8-16-16-8 16-8z" fill="#42d7ca"/>
  </g>
</svg>
