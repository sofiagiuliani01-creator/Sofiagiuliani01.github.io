<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Anamnesi e obiettivi raccolti">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1f3b"/>
      <stop offset="1" stop-color="#0f2b4d"/>
    </linearGradient>
    <linearGradient id="acc02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#89faec"/>
      <stop offset="1" stop-color="#43d8cd"/>
    </linearGradient>
    <style>
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#ebf7ff;stroke-width:14}
      .a{stroke:url(#acc02);stroke-width:14}
      .lift{animation:lift 4.4s ease-in-out infinite}
      .tick{stroke-dasharray:180;stroke-dashoffset:180;animation:draw 2.7s ease-in-out infinite}
      @keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      @keyframes draw{0%,20%{stroke-dashoffset:180}55%,100%{stroke-dashoffset:0}}
    </style>
  </defs>

  <rect x="56" y="44" width="608" height="432" rx="44" fill="url(#bg02)"/>

  <g class="lift" transform-origin="260 260">
    <rect x="126" y="128" width="268" height="264" rx="34" class="stroke w"/>
    <path d="M176 194h164M176 246h130M176 298h152" class="stroke a"/>
    <circle cx="346" cy="346" r="26" class="stroke a" style="stroke-width:10"/>
    <path d="M337 346h18M346 337v18" class="stroke a" style="stroke-width:10"/>
  </g>

  <g class="lift" transform-origin="490 256" style="animation-delay:.2s">
    <circle cx="490" cy="256" r="84" class="stroke w"/>
    <path d="M448 260l30 30 56-66" class="stroke a tick"/>
  </g>
</svg>
