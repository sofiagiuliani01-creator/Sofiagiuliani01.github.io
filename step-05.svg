<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Nuova fase autonoma con risultati mantenuti">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f203b"/>
      <stop offset="1" stop-color="#112f52"/>
    </linearGradient>
    <linearGradient id="acc05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#90faed"/>
      <stop offset="1" stop-color="#4bd8ce"/>
    </linearGradient>
    <style>
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#ebf7ff;stroke-width:14}
      .a{stroke:url(#acc05);stroke-width:14}
      .up{animation:up 4.2s ease-in-out infinite}
      .spark{animation:spark 1.8s ease-in-out infinite}
      @keyframes up{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      @keyframes spark{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.08)}}
    </style>
  </defs>

  <rect x="56" y="44" width="608" height="432" rx="44" fill="url(#bg05)"/>

  <g class="up" transform-origin="254 260">
    <path d="M130 320l96-96 64 64 108-130" class="stroke w"/>
    <path d="M368 158h72v72" class="stroke a"/>
    <circle cx="130" cy="320" r="9" fill="#90faed"/>
    <circle cx="226" cy="224" r="9" fill="#90faed"/>
    <circle cx="290" cy="288" r="9" fill="#90faed"/>
    <circle cx="398" cy="158" r="9" fill="#90faed"/>
  </g>

  <g class="up" transform-origin="532 258" style="animation-delay:.22s">
    <rect x="458" y="184" width="148" height="148" rx="30" class="stroke w"/>
    <path d="M490 258l30 30 54-62" class="stroke a"/>
  </g>

  <g class="spark" transform-origin="610 112">
    <path d="M610 92l8 16 16 8-16 8-8 16-8-16-16-8 16-8z" fill="#4bd8ce"/>
  </g>
</svg>
