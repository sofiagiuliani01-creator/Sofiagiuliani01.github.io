<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Valutazione iniziale personalizzata">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1f3b"/>
      <stop offset="1" stop-color="#102a4f"/>
    </linearGradient>
    <linearGradient id="acc01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef8ea"/>
      <stop offset="1" stop-color="#37d3c8"/>
    </linearGradient>
    <style>
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#ebf7ff;stroke-width:14}
      .a{stroke:url(#acc01);stroke-width:14}
      .float{animation:float 4.2s ease-in-out infinite}
      .pulse{animation:pulse 2.1s ease-in-out infinite}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes pulse{0%,100%{opacity:.6;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
    </style>
  </defs>

  <rect x="56" y="44" width="608" height="432" rx="44" fill="url(#bg01)"/>

  <g class="float" transform-origin="250 258">
    <rect x="126" y="134" width="248" height="248" rx="34" class="stroke w"/>
    <path d="M172 204h156M172 254h104M172 304h128" class="stroke a"/>
  </g>

  <g class="float" transform-origin="468 254" style="animation-delay:.25s">
    <circle cx="468" cy="254" r="86" class="stroke w"/>
    <circle cx="468" cy="254" r="34" class="stroke a"/>
    <path d="M492 278l42 42" class="stroke a"/>
  </g>

  <g class="pulse" transform-origin="146 116">
    <circle cx="146" cy="116" r="10" fill="#7ef8ea"/>
  </g>
</svg>
