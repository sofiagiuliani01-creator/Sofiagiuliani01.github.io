<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Monitoraggio andamento del percorso">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f213d"/>
      <stop offset="1" stop-color="#102e53"/>
    </linearGradient>
    <linearGradient id="acc04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8cfaec"/>
      <stop offset="1" stop-color="#48d8cd"/>
    </linearGradient>
    <style>
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#ebf7ff;stroke-width:14}
      .a{stroke:url(#acc04);stroke-width:14}
      .slide{animation:slide 4.2s ease-in-out infinite}
      .needle{transform-origin:510px 250px;animation:needle 2.4s ease-in-out infinite}
      @keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
      @keyframes needle{0%,100%{transform:rotate(-28deg)}50%{transform:rotate(16deg)}}
    </style>
  </defs>

  <rect x="56" y="44" width="608" height="432" rx="44" fill="url(#bg04)"/>

  <g transform-origin="246 260" class="slide">
    <rect x="116" y="144" width="264" height="232" rx="30" class="stroke w"/>
    <path d="M164 322v-72M224 322v-124M284 322v-92M344 322v-44" class="stroke a"/>
    <path d="M152 212h192" class="stroke w" style="stroke-width:10;opacity:.75"/>
  </g>

  <g transform-origin="510 250" class="slide" style="animation-delay:.2s">
    <circle cx="510" cy="250" r="94" class="stroke w"/>
    <path d="M510 250l58-18" class="stroke a needle"/>
    <circle cx="510" cy="250" r="10" fill="#8cfaec"/>
    <path d="M458 302h104" class="stroke a" style="stroke-width:10"/>
  </g>
</svg>
