<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Nuova fase autonoma con risultati mantenuti">
  <defs>
    <linearGradient id="aqua05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#90faed"/>
      <stop offset="1" stop-color="#49d8ce"/>
    </linearGradient>
    <style>
      .ln{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#eaf8ff;stroke-width:15}
      .a{stroke:url(#aqua05);stroke-width:15}
      .u{animation:up 4.2s ease-in-out infinite}
      .g{animation:glow 1.9s ease-in-out infinite}
      @keyframes up{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes glow{0%,100%{opacity:.55}50%{opacity:1}}
    </style>
  </defs>

  <g class="u" transform-origin="262 256">
    <path d="M126 316l98-98 68 68 106-126" class="ln w"/>
    <path d="M372 160h72v72" class="ln a"/>
    <circle cx="126" cy="316" r="10" fill="#90faed"/>
    <circle cx="224" cy="218" r="10" fill="#90faed"/>
    <circle cx="292" cy="286" r="10" fill="#90faed"/>
    <circle cx="398" cy="160" r="10" fill="#90faed"/>
  </g>

  <g transform-origin="530 258" class="u" style="animation-delay:.2s">
    <rect x="456" y="184" width="148" height="148" rx="30" class="ln w"/>
    <path d="M488 260l30 30 54-62" class="ln a"/>
  </g>

  <path class="g" d="M612 110l8 16 16 8-16 8-8 16-8-16-16-8 16-8z" fill="#49d8ce"/>
