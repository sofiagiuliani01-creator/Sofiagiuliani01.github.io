<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="Anamnesi e obiettivi raccolti">
  <defs>
    <linearGradient id="aqua02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8af9eb"/>
      <stop offset="1" stop-color="#4ddcd1"/>
    </linearGradient>
    <style>
      .ln{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .w{stroke:#eaf8ff;stroke-width:15}
      .a{stroke:url(#aqua02);stroke-width:15}
      .d{stroke-dasharray:260;stroke-dashoffset:260;animation:draw 3s ease-in-out infinite}
      .f{animation:float 4.2s ease-in-out infinite}
      @keyframes draw{0%,15%{stroke-dashoffset:260}45%,100%{stroke-dashoffset:0}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    </style>
  </defs>

  <g class="f" transform-origin="278 260">
    <rect x="120" y="128" width="316" height="264" rx="34" class="ln w"/>
    <path d="M170 192h216M170 238h176M170 284h192M170 330h126" class="ln a"/>
  </g>

  <g transform-origin="510 254" class="f" style="animation-delay:.2s">
    <circle cx="510" cy="254" r="88" class="ln w"/>
    <path d="M468 256l28 28 56-64" class="ln a d"/>
  </g>

  <circle cx="568" cy="130" r="10" fill="#8af9eb"/>
</svg>
